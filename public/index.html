<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会员在线激活</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* 弹窗 */
    .modal-mask {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.55); z-index:1000;
      align-items:center; justify-content:center; padding:20px;
    }
    .modal-mask.show { display:flex; }
    .modal-box {
      background:#fff; border-radius:18px; padding:24px 20px;
      max-width:380px; width:100%; text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
    }
    .modal-box h3 { font-size:18px; margin-bottom:10px; color:#1a1a2e; }
    .modal-box p  { font-size:14px; color:#555; line-height:1.7; margin-bottom:16px; }
    .modal-box .rule-list { text-align:left; margin:12px 0 18px; }
    .modal-box .rule-item {
      display:flex; align-items:flex-start; gap:8px;
      background:#f5f7ff; border-radius:8px; padding:10px 12px; margin-bottom:8px;
    }
    .modal-box .rule-num {
      background:#5b6ef5; color:#fff; border-radius:50%;
      width:20px; height:20px; font-size:12px; font-weight:700;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .modal-box .rule-item p { margin:0; font-size:13px; }
    .modal-btn-row { display:flex; gap:10px; }
    .modal-btn-row .btn-primary { flex:1; padding:12px; }
    .modal-btn-row .btn-cancel {
      flex:1; padding:12px; background:#f0f2f8; color:#555;
      border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer;
    }
    /* 设备类型选择 */
    .device-type-row {
      display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;
    }
    .device-type-btn {
      border:2px solid #e0e4ff; border-radius:10px; padding:10px 8px;
      background:#f5f7ff; color:#5b6ef5; font-size:14px; font-weight:600;
      cursor:pointer; transition:all .15s; text-align:center;
    }
    .device-type-btn:hover, .device-type-btn.selected {
      background:#5b6ef5; color:#fff; border-color:#5b6ef5;
    }
  </style>
</head>
<body>
  <div class="page-wrap">

    <!-- 顶部卡片 -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
        <div class="card-title">
          <h2>会员在线激活</h2>
          <p id="display-token">卡密：加载中...</p>
        </div>
        <button class="btn-service" onclick="openService()">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:#fff"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          客服
        </button>
      </div>
    </div>

    <!-- 状态区 -->
    <div class="status-row">
      <div class="status-box">
        <div class="label">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:#888"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
          到期时间
        </div>
        <div class="value" id="expires-at">—</div>
      </div>
      <div class="status-box">
        <div class="label">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:#888"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-10 3h2v2h-2V6zm0 4h2v2h-2v-2zm-4-4h2v2H7V6zm0 4h2v2H7v-2zm-2 8H5v-2h2v2zm12 0h-2v-2h2v2zm0-4H7v-2h10v2zm0-4h-2v-2h2v2zm0-4h-2V6h2v2z"/></svg>
          绑定设备
        </div>
        <div id="bound-device"><span class="badge badge-warn">⚠ 未绑定</span></div>
      </div>
    </div>

    <!-- 扫码次数 & 卡类型 -->
    <div class="card" style="padding:12px 18px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;color:#888">卡类型：<strong id="card-type-name" style="color:#5b6ef5">—</strong></span>
        <span id="scan-remain" style="font-size:14px;font-weight:700;color:#888">—</span>
      </div>
    </div>

    <!-- 激活提示（未激活时显示） -->
    <div id="activate-panel" class="card" style="display:none">
      <p style="font-size:14px;color:#555;margin-bottom:12px">此卡密尚未激活，点击下方按钮绑定当前设备</p>
      <button class="btn-primary" style="width:100%" onclick="activateCard()">立即激活并绑定设备</button>
    </div>

    <!-- 扫码区 -->
    <div class="card scan-card">
      <div class="sc-header">
        <div class="sc-icon">
          <svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-2H3v-2h2v-2zm8-12v8h8V3h-8zm6 6h-4V5h4v4zm-5.99 4h2v2h-2zm2 2h2v2h-2zm-2 2h2v2h-2zm4 0h2v2h-2zm2-2h2v2h-2zm-4-4h2v2h-2zm4 4h2v2h-2z"/></svg>
        </div>
        <div class="sc-text">
          <h3>扫码激活登录</h3>
          <p id="sc-subtitle">支持手机 · 电脑 · 网页 · 平板</p>
        </div>
        <button class="btn-tutorial" onclick="window.open('/tutorial/index.html','_blank')">
          <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:#e05252"><path d="M8 5v14l11-7z"/></svg>
          教程
        </button>
      </div>

      <div class="scan-btns">
        <button class="btn-scan btn-scan-qr" onclick="onScanBtn('camera')">
          <svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-2H3v-2h2v-2zm8-12v8h8V3h-8zm6 6h-4V5h4v4zm-5.99 4h2v2h-2zm2 2h2v2h-2zm-2 2h2v2h-2zm4 0h2v2h-2zm2-2h2v2h-2zm-4-4h2v2h-2zm4 4h2v2h-2z"/></svg>
          扫码登录
        </button>
        <button class="btn-scan btn-upload" onclick="onScanBtn('upload')">
          <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
          上传二维码
        </button>
        <input type="file" accept="image/*" id="qr-file" style="display:none" onchange="uploadQR(this)">
      </div>

      <!-- 摄像头预览 -->
      <div id="camera-wrap">
        <video id="camera-video" autoplay playsinline></video>
        <button class="btn-close-cam" onclick="stopCamera()">关闭</button>
        <canvas id="camera-canvas" style="display:none"></canvas>
      </div>

      <!-- 结果 -->
      <div class="qr-result" id="qr-result"></div>
    </div>

    <!-- 解除绑定 -->
    <button class="btn-unbind" onclick="unbindDevice()">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:#b45309"><path d="M17 7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h10c2.76 0 5-2.24 5-5s-2.24-5-5-5zm0 8H7c-1.66 0-3-1.34-3-3s1.34-3 3-3h10c1.66 0 3 1.34 3 3s-1.34 3-3 3zm-3-3c0 1.1.9 2 2 2s2-.9 2-2-.9-2-2-2-2 .9-2 2z"/></svg>
      自动验证解除设备上限
    </button>

    <!-- 提示区 -->
    <div class="card">
      <div class="tips-header">
        <div class="icon-i">i</div>
        <span>重要提示</span>
      </div>
      <div class="tip-item"><div class="tip-num">1</div><p id="tip-device-rule">每个卡密激活后绑定设备，请妥善保管卡密</p></div>
      <div class="tip-item"><div class="tip-num">2</div><p>上传二维码后请立即返回 APP，保持二维码页面不要操作</p></div>
      <div class="tip-item"><div class="tip-num">3</div><p>二维码内容安全传输，请勿将卡密泄露给他人</p></div>
    </div>

    <footer>© 2025 卡密激活系统 · <a href="#">安全加密</a> · <a href="#">高效便捷</a></footer>
  </div>

  <div class="toast" id="toast"></div>

  <!-- 首次提示弹窗 -->
  <div class="modal-mask" id="modal-welcome">
    <div class="modal-box">
      <h3>⚠️ 使用须知</h3>
      <p id="modal-card-type-desc">请仔细阅读以下规则</p>
      <div class="rule-list" id="modal-rules"></div>
      <div class="modal-btn-row">
        <button class="btn-primary" onclick="closeWelcome()">我已了解，开始使用</button>
      </div>
    </div>
  </div>

  <!-- 设备类型选择弹窗 -->
  <div class="modal-mask" id="modal-device-type">
    <div class="modal-box">
      <h3>📱 选择当前使用设备</h3>
      <p>首次登录成功后将锁定设备类型，后续只能在同类型设备使用</p>
      <div class="device-type-row">
        <button class="device-type-btn" onclick="selectDeviceType('phone')">📱 手机</button>
        <button class="device-type-btn" onclick="selectDeviceType('pc')">💻 电脑</button>
        <button class="device-type-btn" onclick="selectDeviceType('tv')">📺 电视</button>
        <button class="device-type-btn" onclick="selectDeviceType('tablet')">📟 平板</button>
      </div>
      <div class="modal-btn-row">
        <button class="btn-cancel" onclick="closeDeviceModal()">取消</button>
      </div>
    </div>
  </div>

  <!-- ZXing CDN -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script src="/js/activate.js"></script>
</body>
</html>
