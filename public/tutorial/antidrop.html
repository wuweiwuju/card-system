<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>防掉线方法教程</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 24px 20px;

      width: 100%;

    h1 { color: #333; margin-bottom: 15px; font-size: 20px; text-align: center; }
    .video-wrapper { width: 100%; background: #000; border-radius: 12px; overflow: hidden; }
    video { width: 100%; display: block; }
    .warning {
      background: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
      color: #856404;
      font-size: 14px;
      line-height: 1.8;
      text-align: left;
    }
    .warning strong { color: #d32f2f; }
    .back-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 22px;
      font-size: 14px;
      color: white;
      background: linear-gradient(135deg, #56ab2f, #a8e063);

      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }

<body>
  <div class="container">
