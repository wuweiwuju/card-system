<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电视端教程</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 15px; font-size: 22px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      margin: 10px 0;
      font-size: 16px;
      color: white;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .content {
      font-size: 15px;
      line-height: 1.9;
      color: #333;
      text-align: left;
      margin: 15px 0;
      padding: 15px;
      background: #f8f8f8;
      border-radius: 10px;
    }
    .content strong { color: #d32f2f; }
    .tip {
      background: #fff3cd;
      border: 2px solid #d32f2f;
      border-radius: 8px;
      padding: 10px;
      margin-top: 14px;
      color: #d32f2f;
      font-size: 13px;
      text-align: left;
      font-weight: bold;
    }
    .back-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 22px;
      font-size: 14px;
      color: white;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📺 电视端教程</h1>
    <a href="video.html?type=电视端" class="btn">📺 查看视频教程</a>
    <div class="content">
      <strong>电视/投影用腾讯云视听极光</strong><br><br>
      <strong>打开之后如果有号先退出</strong><br>
      <strong>然后点登录</strong><br>
      把扫码拍照发我就行<br>
      等我登录成功<strong>再操作电视</strong>
    </div>
    <div class="tip">⚠️ <strong>注意：</strong>发码之后一定一定一定不要操作返回！！！</div>
    <a href="index.html" class="back-btn">← 返回</a>
  </div>
</body>
</html>
