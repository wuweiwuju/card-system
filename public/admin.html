<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡密管理后台</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .tab-bar { display:flex; gap:8px; margin-bottom:16px; }
    .tab-btn { padding:8px 20px; border:1.5px solid #ddd; border-radius:8px; background:#fff; font-size:14px; cursor:pointer; }
    .tab-btn.active { background:#5b6ef5; color:#fff; border-color:#5b6ef5; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .config-table { width:100%; border-collapse:collapse; background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.06); }
    .config-table th,.config-table td { padding:12px 14px; font-size:13px; border-bottom:1px solid #f0f2f8; text-align:left; }
    .config-table th { background:#f5f7ff; font-weight:700; color:#555; }
    .config-table input[type=number] { width:70px; padding:5px 8px; border:1.5px solid #ddd; border-radius:6px; font-size:13px; }
  </style>
</head>
<body>
  <!-- 登录面板 -->
  <div id="login-panel" class="admin-login">
    <h2>🔐 管理员登录</h2>
    <input type="password" id="admin-key" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-primary" style="width:100%" onclick="login()">登录</button>
    <p id="login-err" style="color:#e05252;font-size:13px;margin-top:8px"></p>
  </div>

  <!-- 管理面板 -->
  <div id="admin-panel" class="admin-wrap" style="display:none">

    <div class="admin-toolbar">
      <h2>卡密管理后台</h2>
      <div style="display:flex;gap:8px;margin-left:auto;align-items:center">
        <button class="btn-primary" onclick="showGenPanel()">+ 批量生成</button>
        <button class="btn-primary" style="background:#18a058" onclick="exportCSV()">导出 CSV</button>
        <button class="btn-primary" style="background:#5b6ef5;padding:10px 14px" onclick="fetchCards()" title="刷新列表">🔄</button>
        <button style="background:none;border:1.5px solid #ddd;border-radius:8px;padding:9px 14px;font-size:13px;color:#888;cursor:pointer" onclick="logout()">退出</button>
      </div>
    </div>

    <!-- 生成面板 -->
    <div class="gen-panel" id="gen-panel" style="display:none;flex-direction:column;gap:12px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <label>选择卡类型：</label>
        <select id="gen-card-type" style="padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px" onchange="onCardTypeChange()">
          <option value="monthly">月卡</option>
          <option value="seasonal">季卡</option>
          <option value="yearly">年卡</option>
          <option value="nba">NBA赛季卡</option>
          <option value="f1">F1赛季卡</option>
        </select>
        <span id="gen-type-info" style="font-size:13px;color:#888"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <label>数量</label>
        <input type="number" id="gen-count" value="5" min="1" max="100">
        <button class="btn-primary" onclick="generateCards()">生成</button>
        <button class="btn-warn" onclick="document.getElementById('gen-panel').style.display='none'">取消</button>
        <div id="gen-result" style="font-size:13px;color:#18a058"></div>
      </div>
    </div>

    <!-- Tab 切换 -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('cards')">卡密列表</button>
      <button class="tab-btn" onclick="switchTab('config')">套餐配置</button>
      <button class="tab-btn" onclick="switchTab('devices')">设备管理</button>
    </div>

    <!-- 卡密列表 tab -->
    <div id="tab-cards" class="tab-panel active">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">
        <input id="search-input" type="text" placeholder="搜索卡密 / IP..."
          style="padding:9px 13px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;width:220px;outline:none"
          oninput="renderTable()">
        <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;white-space:nowrap">
          <input type="checkbox" id="filter-today" onchange="renderTable()" style="width:15px;height:15px">
          仅显示今日创建
        </label>
        <button class="btn-primary" style="background:#f59e0b;white-space:nowrap" onclick="exportCSV(true)">导出今日</button>
      </div>
      <table id="cards-table">
        <thead>
          <tr>
            <th>卡密</th>
            <th>类型 / 状态</th>
            <th>到期时间</th>
            <th>扫码次数</th>
            <th>创建时间</th>
            <th style="text-align:right">操作</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <p style="font-size:12px;color:#aaa;margin-top:10px" id="card-count"></p>
    </div>

    <!-- 设备管理 tab -->
    <div id="tab-devices" class="tab-panel">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div id="device-stats" style="font-size:13px;color:#888"></div>
        <button class="btn-primary" style="margin-left:auto" onclick="fetchDevices()">刷新</button>
      </div>
      <table class="config-table" id="devices-table">
        <thead>
          <tr>
            <th>设备序列号</th>
            <th>型号</th>
            <th>状态</th>
            <th>平台</th>
            <th>当前任务</th>
            <th>累计任务</th>
            <th>最近使用</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="devices-body">
          <tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px">点击刷新加载设备列表</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 套餐配置 tab -->
    <div id="tab-config" class="tab-panel">
      <p style="font-size:13px;color:#888;margin-bottom:12px">修改后点击「保存配置」，新生成的卡密将使用新配置（已有卡密不受影响）</p>
      <table class="config-table">
        <thead>
          <tr><th>类型Key</th><th>名称</th><th>天数</th><th>扫码次数上限</th><th>设备台数上限</th><th>操作</th></tr>
        </thead>
        <tbody id="config-body"></tbody>
      </table>

      <!-- 新增套餐 -->
      <div style="margin-top:16px;background:#f5f7ff;border-radius:12px;padding:16px">
        <div style="font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:12px">+ 新增套餐</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <input id="new-type-key" type="text" placeholder="类型Key（如: weekly）" style="padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;width:150px">
          <input id="new-type-name" type="text" placeholder="名称（如: 周卡）" style="padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;width:130px">
          <input id="new-type-days" type="number" placeholder="天数" min="1" style="padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;width:80px">
          <input id="new-type-scan" type="number" placeholder="扫码次数" min="1" style="padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;width:90px">
          <input id="new-type-device" type="number" placeholder="设备台数" min="1" style="padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;width:90px">
          <button class="btn-primary" onclick="addCardType()">新增</button>
        </div>
        <p id="new-type-err" style="font-size:12px;color:#e05252;margin-top:6px"></p>
      </div>

      <div style="margin-top:14px;display:flex;align-items:center;gap:10px">
        <button class="btn-primary" onclick="saveConfig()">保存配置</button>
        <span id="config-result" style="font-size:13px;color:#18a058"></span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/admin.js"></script>
</body>
</html>
