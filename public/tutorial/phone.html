<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手机端教程</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 20px; font-size: 22px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      margin: 10px 0;
      font-size: 16px;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: transform .2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-red    { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .btn-orange { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
    .warning {
      background: #fff3cd;
      border: 2px solid #d32f2f;
      border-radius: 10px;
      padding: 12px;
      margin-top: 14px;
      color: #d32f2f;
      font-size: 13px;
      line-height: 1.6;
      text-align: left;
      font-weight: bold;
    }
    .back-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 22px;
      font-size: 14px;
      color: white;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 手机端教程</h1>
    <a href="video.html?type=手机端-腾讯体育" class="btn btn-red">🔵 腾讯体育 APP</a>
    <a href="video.html?type=手机端-腾讯视频" class="btn btn-orange">🎬 腾讯视频 APP</a>
    <div class="warning">
      ⚠️ <strong>注意：</strong>发码之后一定一定一定不要操作返回！！！就在码的界面等就行了，如果返回，一定登不上！！！
    </div>
    <a href="index.html" class="back-btn">← 返回</a>
  </div>
</body>
</html>
