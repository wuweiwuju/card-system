<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电脑端教程</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 20px; font-size: 22px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      margin: 10px 0;
      font-size: 16px;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: transform .2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-cyan { background: linear-gradient(135deg, #00d2ff, #3a7bd5); }
    .btn-red  { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .back-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 22px;
      font-size: 14px;
      color: white;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💻 电脑端教程</h1>
    <a href="computer-sports.html" class="btn btn-cyan">🔵 腾讯体育网页端</a>
    <a href="computer-video.html" class="btn btn-red">🎬 腾讯视频客户端</a>
    <a href="index.html" class="back-btn">← 返回</a>
  </div>
</body>
</html>
